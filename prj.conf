CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_DHT20=y

# PCF8563 RTC on XIAO Expansion Board (battery-backed, survives power loss)
# RTC_PCF8563 is auto-enabled via DT_HAS_NXP_PCF8563_ENABLED when the DTS
# node is present; only the RTC subsystem needs to be explicitly selected.
CONFIG_RTC=y

# NVS persistent storage
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# Shell interface (show/clear log, set time)
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_LOG_BACKEND=y
CONFIG_SHELL_STACK_SIZE=2048

# LED blink on sample / BLE connected indicator
CONFIG_GPIO=y

# ── BLE Nordic UART Service (NUS) ─────────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="IcicleTHLogger"
CONFIG_BT_DEVICE_APPEARANCE=0

# Allow bt_set_name() to change the device name at runtime (required for NVS
# name persistence and the "thble name" shell command).  Without this,
# bt_set_name() returns -ENOMEM (-12) and BLE init fails entirely.
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=29

# Nordic UART Service (command/response over BLE)
CONFIG_BT_NUS=y

# Data Length Extension: up to 251-byte LL payload → 244-byte ATT payload
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=255
CONFIG_BT_BUF_ACL_TX_SIZE=255

# BLE callbacks run on the system workqueue — needs more stack
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Suppress noisy BT debug traces
CONFIG_BT_HCI_CORE_LOG_LEVEL_WRN=y
CONFIG_BT_HCI_DRIVER_LOG_LEVEL_WRN=y
CONFIG_BT_LOG_LEVEL_WRN=y

