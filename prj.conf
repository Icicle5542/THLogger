CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_DHT20=y

# PCF8563 RTC on XIAO Expansion Board (battery-backed, survives power loss)
# RTC_PCF8563 is auto-enabled via DT_HAS_NXP_PCF8563_ENABLED when the DTS
# node is present; only the RTC subsystem needs to be explicitly selected.
CONFIG_RTC=y

# NVS persistent storage
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# Shell interface (show/clear log, set time)
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_LOG_BACKEND=y
CONFIG_SHELL_STACK_SIZE=2048

# LED blink on sample
CONFIG_GPIO=y

