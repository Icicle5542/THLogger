# Static partition manager configuration for THLogger on XIAO nRF54L15.
#
# cpuapp_rram total: 1,428 KB (0x000000 – 0x165000).
# The remaining 96 KB (0x165000 – 0x180000) belongs to the FLPR core.
#
# This project does NOT use MCUBoot or OTA, so the standard board-DTSI
# slot1_partition (664 KB) is unused.  We reclaim that space to give NVS
# a 512 KB region, providing ~34 days of 5-minute T/H + vibration samples.
#
# Layout
# ------
#   0x000000 – 0x0E5000  app          916 KB  (firmware image)
#   0x0E5000 – 0x165000  nvs_storage  512 KB  (128 × 4 KB RRAM pages)

app:
  address: 0x000000
  size: 0x0E5000
  region: flash_primary

nvs_storage:
  address: 0x0E5000
  size: 0x080000
  region: flash_primary
